name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SHA256 checksum
        run: sha256sum index.html > SHA256SUMS

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Apex Wallet ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          body: |
            ## Apex Wallet — Meowcoin

            Single-file web wallet for Meowcoin (MEWC). Open `index.html` in any browser.
            No installation, no server, no build step required.

            ### Verify the release

            ```sh
            # Download the files
            curl -LO https://github.com/meowcoin-foundation/apex-webwallet/releases/download/${{ steps.tag.outputs.tag }}/index.html
            curl -LO https://github.com/meowcoin-foundation/apex-webwallet/releases/download/${{ steps.tag.outputs.tag }}/SHA256SUMS

            # Verify checksum
            sha256sum -c SHA256SUMS
            ```
          files: |
            index.html
            SHA256SUMS
